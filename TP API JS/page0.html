<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ville App</title>
</head>
	<body>
		<div id="root"></div>
		<script>
			let xhr = new XMLHttpRequest();
			var toto = [];

			xhr.open("GET", "https://geo.api.gouv.fr/departements/30/communes?fields=nom&format=json&geometry=centre");

			xhr.send();

			xhr.onload = function(){
				if(xhr.status == 200){
					toto = JSON.parse(xhr.response);
					for(var el of toto){
						console.log(el.nom);
					}
				}
			}
		</script>
	</body>
</html>
